const DEFAULT_SKILLS={

  f2:{"Java / Spring Boot":5,"React / Angular / Vue":4,"Microservices":4,"REST / GraphQL":3,"Selenium / Automation":3,"Docker / Kubernetes":2,"Jenkins / GitHub Actions":2,"AI Fundamentals":3,"Prompt Engineering":2,"Agentic AI Design":2},
  f3:{"Java / Spring Boot":4,"React / Angular / Vue":4,"REST / GraphQL":2,"Manual Testing":3,"Selenium / Automation":2,"AI Fundamentals":1},
  f4:{"AWS":2,"Azure":4,"Multicloud":5,"VMware / SDDC":5,"IaaC / Terraform":4,"Cloud Networking":4,"DR / BCP":4,"Network Security":3,"Cloud Security":3,"AI Fundamentals":2},

function loadFromStorage(key, fallback){
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}
  catch{return fallback;}
}
function saveToStorage(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

// ── Atoms ─────────────────────────────────────────────────────────────────────
function ProfBadge({value,small}){
  if(!value)return React.createElement('span',{style:{color:"#C4CDD6",fontSize:11}},"–");
  const p=PROF.find(x=>x.v===value);
  return React.createElement('span',{style:{background:p.bg,color:p.tc,borderRadius:4,
    padding:small?"1px 5px":"2px 7px",fontSize:small?10:11,fontWeight:700,
    display:"inline-block",textAlign:"center",minWidth:18}},value);
}

function Btn({children,onClick,variant="primary",small,disabled,style:sx={}}){
  const v={
    primary:{background:"#00BFA5",color:"#fff",border:"none"},
    secondary:{background:"#1C2B3A",color:"#fff",border:"none"},
    danger:{background:"#FEE2E2",color:"#B91C1C",border:"1px solid #FCA5A5"},
    ghost:{background:"transparent",color:"#5F7080",border:"1.5px solid #D4DCE4"},
  };
  return React.createElement('button',{onClick,disabled,
    style:{...v[variant],borderRadius:6,cursor:disabled?"not-allowed":"pointer",
      padding:small?"4px 10px":"7px 16px",fontSize:small?11:12,fontWeight:600,
      opacity:disabled?.5:1,fontFamily:"inherit",transition:"opacity .15s",whiteSpace:"nowrap",...sx}
  },children);
}

function Modal({title,onClose,children,width=500}){
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);
  return React.createElement('div',{
    style:{position:"fixed",inset:0,background:"rgba(12,20,30,.55)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16},
    onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement('div',{style:{background:"#fff",borderRadius:12,width:"100%",maxWidth:width,
      maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,.22)"}},
      React.createElement('div',{style:{padding:"16px 22px",borderBottom:"1px solid #EEF2F6",
        display:"flex",alignItems:"center",gap:10}},
        React.createElement('span',{style:{flex:1,fontWeight:700,fontSize:14,color:"#1C2B3A"}},title),
        React.createElement('button',{onClick:onClose,style:{background:"none",border:"none",
          fontSize:18,cursor:"pointer",color:"#94A3B8",lineHeight:1}},"✕")
      ),
      React.createElement('div',{style:{padding:"18px 22px"}},children)
    )
  );
}

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  return React.createElement('div',{style:{position:"fixed",bottom:24,right:24,
    background:"#1C2B3A",color:"#fff",borderRadius:8,padding:"10px 18px",
    fontSize:13,fontWeight:500,boxShadow:"0 4px 16px rgba(0,0,0,.2)",zIndex:2000,
    animation:"fadeIn .2s"}},
    "✓  "+msg
  );
}

// ── Skill Form ────────────────────────────────────────────────────────────────
function SkillForm({existing,onSave,onClose}){
  const [grpKey,setGrpKey]=useState(existing?.grpKey||SKILL_GROUPS[0].key);
  const [skill,setSkill]=useState(existing?.skill||"");
  const [custom,setCustom]=useState("");
  const [prof,setProf]=useState(existing?.prof||3);
  const grp=SKILL_GROUPS.find(g=>g.key===grpKey);
  const finalSkill=skill==="__custom__"?custom.trim():skill;

  return React.createElement(Modal,{title:existing?"Edit skill":"Add skill",onClose,width:530},
    React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:16}},
      React.createElement('div',null,
        React.createElement('label',{style:{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:8,letterSpacing:".06em"}},"SKILL GROUP"),
        React.createElement('div',{style:{display:"flex",flexWrap:"wrap",gap:5}},
          SKILL_GROUPS.map(g=>React.createElement('button',{key:g.key,onClick:()=>{setGrpKey(g.key);setSkill("");setCustom("");},
            style:{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"inherit",
              border:grpKey===g.key?`2px solid ${g.color.accent}`:"1.5px solid #E2E8F0",
              background:grpKey===g.key?g.color.bg:"#fff",color:grpKey===g.key?g.color.dark:"#64748B"}
          },g.label))
        )
      ),
      React.createElement('div',null,
        React.createElement('label',{style:{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:6,letterSpacing:".06em"}},"SKILL / TECHNOLOGY"),
        React.createElement('select',{value:skill,onChange:e=>setSkill(e.target.value),
          style:{width:"100%",padding:"8px 10px",borderRadius:6,border:"1.5px solid #D4DCE4",fontSize:13,fontFamily:"inherit"}},
          React.createElement('option',{value:""},"— select a skill —"),
          grp.skills.map(s=>React.createElement('option',{key:s,value:s},s)),
          React.createElement('option',{value:"__custom__"},"+ Enter custom skill…")
        ),
        skill==="__custom__"&&React.createElement('input',{
          placeholder:"Type custom skill name…",value:custom,onChange:e=>setCustom(e.target.value),autoFocus:true,
          style:{marginTop:8,width:"100%",padding:"8px 10px",borderRadius:6,border:"1.5px solid #00BFA5",fontSize:13,fontFamily:"inherit"}
        })
      ),
      React.createElement('div',null,
        React.createElement('label',{style:{fontSize:11,fontWeight:700,color:"#64748B",display:"block",marginBottom:6,letterSpacing:".06em"}},"PROFICIENCY LEVEL"),
        React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:5}},
          PROF.map(p=>React.createElement('label',{key:p.v,
            style:{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderRadius:6,cursor:"pointer",
              border:prof===p.v?`2px solid ${p.bg}`:"1.5px solid #EEF2F6",
              background:prof===p.v?p.bg+"22":"#FAFBFC"}},
            React.createElement('input',{type:"radio",name:"prof",checked:prof===p.v,onChange:()=>setProf(p.v),style:{accentColor:p.bg,flexShrink:0}}),
            React.createElement('span',{style:{background:p.bg,color:p.tc,borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:800,minWidth:20,textAlign:"center"}},p.v),
            React.createElement('span',{style:{fontWeight:600,fontSize:13,color:"#1C2B3A",minWidth:90}},p.l),
            React.createElement('span',{style:{fontSize:11,color:"#94A3B8"}},p.d)
          ))
        )
      ),
      React.createElement('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",paddingTop:4}},
        React.createElement(Btn,{variant:"ghost",onClick:onClose},"Cancel"),
        React.createElement(Btn,{onClick:()=>finalSkill&&onSave({grpKey,skill:finalSkill,prof}),
          disabled:!finalSkill||finalSkill==="__custom__"},existing?"Save changes":"Add skill")
      )
    )
  );
}

// ── FSE Form ──────────────────────────────────────────────────────────────────

// ── Educator View ─────────────────────────────────────────────────────────────
function EducatorView({fse,allSkills,onUpdate,onToast}){
  const [modal,setModal]=useState(null);
  const [filterGrp,setFilterGrp]=useState("all");
  const mySkills=allSkills[fse.id]||{};
  const cnt=Object.keys(mySkills).length;
  const avg=cnt?(Object.values(mySkills).reduce((a,b)=>a+b,0)/cnt).toFixed(1):"–";
  const hi=Object.values(mySkills).filter(v=>v>=4).length;

  const rows=Object.entries(mySkills)
    .map(([skill,prof])=>{const grp=SKILL_GROUPS.find(g=>g.skills.includes(skill))||SKILL_GROUPS[0];return{skill,prof,grp};})
    .filter(r=>filterGrp==="all"||r.grp.key===filterGrp)
    .sort((a,b)=>a.grp.key.localeCompare(b.grp.key)||a.skill.localeCompare(b.skill));

  function save({grpKey,skill,prof}){
    onUpdate(fse.id,{...mySkills,[skill]:prof});
    setModal(null);
    onToast(modal?.mode==="edit"?"Skill updated":"Skill added");
  }
  function del(skill){
    const n={...mySkills};delete n[skill];
    onUpdate(fse.id,n);
    onToast("Skill removed");
  }

  return React.createElement('div',{style:{maxWidth:800,margin:"0 auto"}},
    // Identity card
    React.createElement('div',{style:{background:"linear-gradient(135deg,#1C2B3A,#243547)",borderRadius:12,
      padding:"20px 26px",marginBottom:22,display:"flex",alignItems:"center",gap:18,
      boxShadow:"0 4px 16px rgba(0,0,0,.14)"}},
      React.createElement('div',{style:{width:50,height:50,borderRadius:"50%",background:"#00BFA5",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontWeight:800,color:"#fff",flexShrink:0}},
        fse.name.split(" ").map(w=>w[0]).join("").slice(0,2)
      ),
      React.createElement('div',{style:{flex:1}},
        React.createElement('div',{style:{color:"#fff",fontWeight:700,fontSize:16}},fse.name),
        React.createElement('div',{style:{color:"#7FB3CC",fontSize:12,marginTop:2}},fse.grade+(fse.grade?" · ":"")+fse.role+" · "+fse.track+" FSE")
      ),
      ...[["Skills",cnt,"#00BFA5"],["Avg level",avg,"#60A5FA"],["Level 4–5",hi,"#A78BFA"]].map(([l,v,c])=>
        React.createElement('div',{key:l,style:{textAlign:"center",minWidth:60}},
          React.createElement('div',{style:{color:c,fontWeight:800,fontSize:22}},v),
          React.createElement('div',{style:{color:"#7FB3CC",fontSize:10,marginTop:1}},l)
        )
      )
    ),
    // Controls
    React.createElement('div',{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}},
      React.createElement('select',{value:filterGrp,onChange:e=>setFilterGrp(e.target.value),
        style:{padding:"6px 10px",borderRadius:6,border:"1.5px solid #D4DCE4",fontSize:12,fontFamily:"inherit",flex:1,minWidth:140}},
        React.createElement('option',{value:"all"},"All skill groups"),
        SKILL_GROUPS.map(g=>React.createElement('option',{key:g.key,value:g.key},g.label))
      ),
      React.createElement(Btn,{onClick:()=>setModal({mode:"add"})},"+ Add skill")
    ),
    cnt===0
      ? React.createElement('div',{style:{textAlign:"center",padding:"48px 20px",color:"#94A3B8",
          border:"2px dashed #E2E8F0",borderRadius:12}},
          React.createElement('div',{style:{fontSize:40,marginBottom:10}},"🎯"),
          React.createElement('div',{style:{fontWeight:600,fontSize:14,color:"#475569",marginBottom:6}},"No skills added yet"),
          React.createElement('div',{style:{fontSize:13,marginBottom:16}},"Add your first skill to start building your capability profile"),
          React.createElement(Btn,{onClick:()=>setModal({mode:"add"})},"+ Add first skill")
        )
      : React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:8}},
          SKILL_GROUPS.map(grp=>{
            const grpRows=rows.filter(r=>r.grp.key===grp.key);
            if(!grpRows.length)return null;
            return React.createElement('div',{key:grp.key,style:{borderRadius:10,overflow:"hidden",border:`1.5px solid ${grp.color.pill}`}},
              React.createElement('div',{style:{background:grp.color.bg,padding:"7px 14px",display:"flex",alignItems:"center",gap:8}},
                React.createElement('span',{style:{fontSize:13}},grp.icon),
                React.createElement('span',{style:{fontWeight:700,fontSize:11,color:grp.color.dark,textTransform:"uppercase",letterSpacing:".06em"}},grp.label),
                React.createElement('span',{style:{background:grp.color.pill,color:grp.color.dark,borderRadius:20,padding:"1px 8px",fontSize:10,marginLeft:"auto"}},grpRows.length+" skills")
              ),
              ...grpRows.map((r,ri)=>React.createElement('div',{key:r.skill,
                style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
                  background:ri%2===0?"#fff":"#FAFBFD",borderTop:"1px solid #F0F4F8"}},
                React.createElement('span',{style:{flex:1,fontSize:13,color:"#1C2B3A"}},r.skill),
                React.createElement(ProfBadge,{value:r.prof}),
                React.createElement('span',{style:{fontSize:11,color:"#94A3B8",minWidth:80,textAlign:"right"}},PROF.find(p=>p.v===r.prof)?.l),
                React.createElement(Btn,{small:true,variant:"ghost",
                  onClick:()=>setModal({mode:"edit",grpKey:r.grp.key,skill:r.skill,prof:r.prof})},"Edit"),
                React.createElement(Btn,{small:true,variant:"danger",onClick:()=>del(r.skill)},"Remove")
              ))
            );
          })
        ),
    modal&&React.createElement(SkillForm,{
      existing:modal.mode==="edit"?modal:null,
      onSave:save,onClose:()=>setModal(null)
    })
  );
}

// ── PM View ────────────────────────────────────────────────────────────────────
function PMView({fses,allSkills,setFses,setSkills,onToast}){
  const [fseModal,setFseModal]=useState(null);
  const [expanded,setExpanded]=useState(null);
  const [delConfirm,setDelConfirm]=useState(null);
  const [search,setSearch]=useState("");
  const total=Object.values(allSkills).reduce((s,sk)=>s+Object.keys(sk).length,0);

  const filtered=fses.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())||f.role.toLowerCase().includes(search.toLowerCase()));

  function addFSE(data){
    const id="f"+Date.now();
    setFses(p=>{const n=[...p,{id,...data}];saveToStorage(STORAGE_KEY_FSES,n);return n;});
    onToast("FSE added — "+data.name);setFseModal(null);
  }
  function editFSE(id,data){
    setFses(p=>{const n=p.map(f=>f.id===id?{...f,...data}:f);saveToStorage(STORAGE_KEY_FSES,n);return n;});
    onToast("Profile updated");setFseModal(null);
  }
  function deleteFSE(id){
    setFses(p=>{const n=p.filter(f=>f.id!==id);saveToStorage(STORAGE_KEY_FSES,n);return n;});
    setSkills(p=>{const n={...p};delete n[id];saveToStorage(STORAGE_KEY_SKILLS,n);return n;});
    onToast("FSE removed");setDelConfirm(null);
  }

  return React.createElement('div',{style:{maxWidth:860,margin:"0 auto"}},
    // Stats
    React.createElement('div',{style:{display:"flex",gap:12,marginBottom:22,flexWrap:"wrap"}},
      ...[["Total FSEs",fses.length,"#00BFA5"],
          ["Technical",fses.filter(f=>f.track==="Technical").length,"#1A7FCC"],
          ["Skill entries",total,"#6B46E0"],
          ["Groups covered",SKILL_GROUPS.filter(g=>Object.values(allSkills).some(sk=>Object.keys(sk).some(s=>g.skills.includes(s)))).length+"/"+SKILL_GROUPS.length,"#C07800"]

function HeatmapView({fses,allSkills}){
  const [dim,setDim]=useState("proficiency");
  const [track,setTrack]=useState("Technical");
  const [grpFilter,setGrpFilter]=useState("all");
  const [exportModal,setExportModal]=useState(false);

  const filtFses=fses.filter(f=>track==="all"||f.track===track);
  const groups=grpFilter==="all"?SKILL_GROUPS:SKILL_GROUPS.filter(g=>g.key===grpFilter);

  function cellVal(fid,skill){return allSkills[fid]?.[skill]||0;}

  function cellStyle(v,skill){
    if(v===0)return{bg:"#F1F5F9",tc:"#CBD5E1"};
    if(dim==="proficiency"){const p=PROF.find(x=>x.v===v);return{bg:p.bg,tc:p.tc};}
    if(dim==="coverage"){
      const tot=filtFses.length;
      const cnt=filtFses.filter(f=>cellVal(f.id,skill)>0).length;
      const pct=tot?cnt/tot:0;
      if(pct===0)return{bg:"#FEE2E2",tc:"#B91C1C"};
      if(pct<0.5)return{bg:"#FEF3C7",tc:"#92400E"};
      if(pct<1)return{bg:"#378ADD",tc:"#fff"};
      return{bg:"#059669",tc:"#fff"};
    }
    if(v<=1)return{bg:"#FEE2E2",tc:"#B91C1C"};
    if(v<=2)return{bg:"#FEF3C7",tc:"#92400E"};
    if(v<=3)return{bg:"#D1FAE5",tc:"#065F46"};
    return{bg:"#059669",tc:"#fff"};
  }

  function cov(skill){return filtFses.filter(f=>cellVal(f.id,skill)>0).length;}
  function avgP(skill){
    const vs=filtFses.map(f=>cellVal(f.id,skill)).filter(v=>v>0);
    return vs.length?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):"–";
  }

                ),
                ...groups.flatMap((grp,gi)=>grp.skills.map((s,si)=>{

                  const {bg,tc}=cellStyle(v,s);
                  return React.createElement('td',{key:s,style:{padding:"3px 2px",textAlign:"center",

        React.createElement('button',{onClick:()=>setSidebarOpen(o=>!o),
          style:{background:"none",border:"none",cursor:"pointer",color:"#94A3B8",fontSize:18,padding:"2px 6px",borderRadius:4}},
          sidebarOpen?"◀":"▶"
        ),
        React.createElement('div',{style:{flex:1,minWidth:0}},
          React.createElement('div',{style:{fontWeight:700,fontSize:14,color:"#1C2B3A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
            view==="heatmap"?"Capability Heatmap":
            view==="pm"?"Programme Manager · Roster":
            (activeFse?.name||"")+" · Skills"
          ),
          React.createElement('div',{style:{color:"#94A3B8",fontSize:11,marginTop:1}},
            view==="heatmap"?"Multi-dimension view for leadership reviews and proposals":
            view==="pm"?"Manage FSE profiles and track team capability coverage":
            "Add, update and manage your personal skill profile"
          )
        ),
        view==="heatmap"&&React.createElement('div',{style:{display:"flex",gap:5,flexShrink:0}},
          React.createElement('span',{style:{background:"#E8F4FD",color:"#1A7FCC",borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:500}},"Leadership ready"),
          React.createElement('span',{style:{background:"#E0FBF8",color:"#006B5C",borderRadius:20,padding:"2px 10px",fontSize:10,fontWeight:500}},"Proposal ready")
        )
      ),

      // Content
      React.createElement('div',{style:{flex:1,padding:"20px 24px",overflowY:"auto"}},
        view==="heatmap"&&React.createElement(HeatmapView,{fses,allSkills:skills}),
        view==="pm"&&React.createElement(PMView,{fses,allSkills:skills,setFses,setSkills,onToast:showToast}),
        view==="educator"&&activeFse&&React.createElement(EducatorView,{fse:activeFse,allSkills:skills,onUpdate:updateSkills,onToast:showToast})
      )
    ),

    toast&&React.createElement(Toast,{msg:toast,onDone:()=>setToast(null)})
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
